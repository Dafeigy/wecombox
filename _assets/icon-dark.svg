<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- 左下气泡渐变（绿色调） -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ff7d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3de8b0;stop-opacity:1" />
    </linearGradient>

    <!-- 右上气泡渐变（蓝色调） -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a0f0ff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#5bcfff;stop-opacity:0.95" />
    </linearGradient>

    <!-- 高光渐变 -->
    <linearGradient id="shine1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.45" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <!-- 模糊滤镜（玻璃感阴影） -->
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3de8b0" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5bcfff" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 左下绿色气泡 -->
  <g filter="url(#shadow1)">
    <path d="
      M 10,22
      Q 10,8 24,8
      L 60,8
      Q 74,8 74,22
      L 74,48
      Q 74,62 60,62
      L 36,62
      L 28,72
      L 26,62
      L 24,62
      Q 10,62 10,48
      Z
    " fill="url(#grad1)" opacity="0.92"/>
    <!-- 高光 -->
    <path d="
      M 10,22
      Q 10,8 24,8
      L 60,8
      Q 74,8 74,22
      L 74,35
      Q 55,28 36,30
      Q 20,32 10,42
      Z
    " fill="url(#shine1)"/>
  </g>

  <!-- 右上蓝色气泡（半透明叠加） -->
  <g filter="url(#shadow2)">
    <path d="
      M 28,30
      Q 28,16 42,16
      L 76,16
      Q 90,16 90,30
      L 90,56
      Q 90,70 76,70
      L 72,70
      L 70,80
      L 62,70
      L 42,70
      Q 28,70 28,56
      Z
    " fill="url(#grad2)" opacity="0.88"/>
    <!-- 高光 -->
    <path d="
      M 28,30
      Q 28,16 42,16
      L 76,16
      Q 90,16 90,30
      L 90,43
      Q 72,36 54,38
      Q 38,40 28,50
      Z
    " fill="url(#shine2)"/>
  </g>
</svg>